<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultra Scientific Calculator | Advanced Math Engine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #10131f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }

        .calc-container {
            max-width: 700px;
            width: 100%;
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 22px 20px 28px 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .display {
            background: #03050a;
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: inset 0 5px 8px rgba(0, 0, 0, 0.6), 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid #2a2f42;
        }

        .expression {
            font-size: 1.3rem;
            color: #8e9aaf;
            font-family: 'Fira Code', monospace;
            min-height: 2.2rem;
            word-break: break-all;
            text-align: right;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .result {
            font-size: 3.2rem;
            font-weight: 700;
            color: #eef4ff;
            text-align: right;
            font-family: 'Segoe UI', 'Fira Code', monospace;
            word-break: break-word;
            line-height: 1.2;
            margin-top: 8px;
            text-shadow: 0 0 3px #3a6ea5;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        button {
            background: #1e243b;
            border: none;
            padding: 16px 0;
            border-radius: 28px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Segoe UI', 'Fira Code', monospace;
            color: #e2eaff;
            cursor: pointer;
            transition: all 0.12s linear;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid #2e3550;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 2px black;
            background: #2c3457;
        }

        .fn-key {
            background: #2a2f4b;
            color: #c0e0ff;
            font-size: 0.9rem;
        }

        .math-fn {
            background: #1f2a44;
            color: #b9d0ff;
            font-size: 0.85rem;
        }

        .const-key {
            background: #1e2a3a;
            color: #8bbfff;
        }

        .equal-key {
            background: #2f5f8a;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 100, 200, 0.3);
            font-size: 1.3rem;
        }

        .clear-key {
            background: #4a2c2c;
            color: #ffbc9a;
        }

        .del-key {
            background: #38304a;
            color: #ffcd94;
        }

        @media (max-width: 550px) {
            .buttons { gap: 8px; }
            button { padding: 12px 0; font-size: 0.85rem; }
            .result { font-size: 2.3rem; }
            .expression { font-size: 1rem; }
            .fn-key, .math-fn { font-size: 0.75rem; }
        }

        @media (max-width: 480px) {
            button { padding: 10px 0; font-size: 0.7rem; }
        }

        .error-shake {
            animation: errorFlash 0.2s ease-in-out 2;
        }
        @keyframes errorFlash {
            0% { background-color: #03050a; }
            50% { background-color: #88222255; }
            100% { background-color: #03050a; }
        }
        footer {
            font-size: 0.65rem;
            text-align: center;
            color: #4b5677;
            margin-top: 20px;
            font-family: monospace;
        }
        /* Donation buttons styling */
        .donate-link {
            display: inline-block;
            margin: 5px 8px;
            color: #ffcc00;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid #ffcc00;
            padding: 5px 15px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .donate-link:hover {
            background: #ffcc00;
            color: #0b0e1a;
        }
    </style>
</head>
<body>
<div class="calc-container">
    <div class="display">
        <div class="expression" id="expressionDisplay">0</div>
        <div class="result" id="resultDisplay">0</div>
    </div>
    <div class="buttons" id="buttonsGrid"></div>
    <footer>
        ⍟ Ultra Scientific Calculator — by Ebube Arinze <br>
        <a class="donate-link" href="https://buymeacoffee.com/YOUR-BMC-NAME" target="_blank">☕ Buy me a coffee</a>
        <a class="donate-link" href="https://ko-fi.com/YOUR-KOFI-NAME" target="_blank">❤️ Support on Ko‑fi</a>
    </footer>
</div>

<script>
    // ---------- Ultra Scientific Calculator Engine ----------
    let currentExpression = "";
    let lastResult = 0;
    let memoryValue = 0;
    let degMode = true;
    let lastAns = 0;

    const exprDiv = document.getElementById("expressionDisplay");
    const resultDiv = document.getElementById("resultDisplay");

    function updateDisplay() {
        exprDiv.innerText = currentExpression === "" ? "0" : currentExpression;
        resultDiv.innerText = formatResult(lastResult);
    }

    function formatResult(num) {
        if (num === undefined || num === null || isNaN(num) || !isFinite(num)) return "Error";
        let rounded = parseFloat(num.toFixed(12));
        if (Math.abs(rounded - Math.round(rounded)) < 1e-12) return Math.round(rounded).toString();
        let str = rounded.toString();
        if (str.includes(".")) str = str.replace(/\.?0+$/, '');
        if (Math.abs(rounded) > 1e12 || (Math.abs(rounded) < 1e-6 && rounded !== 0))
            return rounded.toExponential(10);
        return str;
    }

    function evaluateExpression(expr, useDegrees = degMode) {
        if (expr.trim() === "") return 0;
        let processed = expr;
        try {
            processed = processed.replace(/π/g, 'PI');
            processed = processed.replace(/ℯ/g, 'E');
            processed = processed.replace(/\be\b/g, 'E');
            processed = processed.replace(/ANS/gi, `(${lastAns})`);
            processed = processed.replace(/MR/g, `(${memoryValue})`);

            function wrapTrig(funcName, inverse = false) {
                const regex = new RegExp(`${funcName}\\(([^)]+)\\)`, 'g');
                processed = processed.replace(regex, (match, inner) => {
                    if (!useDegrees && (funcName === 'sin' || funcName === 'cos' || funcName === 'tan' || 
                        funcName === 'cot' || funcName === 'sec' || funcName === 'csc'))
                        return `Math.${funcName}(${inner})`;
                    else if (useDegrees && !inverse && (funcName === 'sin' || funcName === 'cos' || funcName === 'tan'))
                        return `Math.${funcName}(${inner} * Math.PI / 180)`;
                    else if (useDegrees && inverse && (funcName === 'asin' || funcName === 'acos' || funcName === 'atan'))
                        return `(Math.${funcName}(${inner}) * 180 / Math.PI)`;
                    else if (!useDegrees && inverse)
                        return `Math.${funcName}(${inner})`;
                    else
                        return `Math.${funcName}(${inner})`;
                });
            }

            const directFuncs = ['sqrt', 'cbrt', 'abs', 'floor', 'ceil', 'round', 'exp', 'log', 'log10', 'log2', 'sinh', 'cosh', 'tanh', 'asinh', 'acosh', 'atanh'];
            for (let fn of directFuncs) {
                const regex = new RegExp(`${fn}\\(([^)]+)\\)`, 'g');
                processed = processed.replace(regex, `Math.${fn}($1)`);
            }

            processed = processed.replace(/ln\(([^)]+)\)/g, `Math.log($1)`);
            processed = processed.replace(/lg\(([^)]+)\)/g, `Math.log10($1)`);
            processed = processed.replace(/\^/g, '**');
            processed = processed.replace(/(\d+(?:\.\d+)?|\([^)]+\))\!/g, (match, numStr) => `factorial_util(${numStr})`);
            processed = processed.replace(/(\d+(?:\.\d+)?|\([^)]+\))%/g, '($1/100)');
            processed = processed.replace(/rand\(\)/g, `(Math.random())`);
            processed = processed.replace(/gamma\(([^)]+)\)/g, `gamma_util($1)`);
            processed = processed.replace(/root\(([^,]+),([^)]+)\)/g, `Math.pow($1, 1/$2)`);
            processed = processed.replace(/hypot\(([^,]+),([^)]+)\)/g, `Math.hypot($1,$2)`);
            processed = processed.replace(/C\((\d+),(\d+)\)/g, `comb_util($1,$2)`);
            processed = processed.replace(/P\((\d+),(\d+)\)/g, `perm_util($1,$2)`);
            processed = processed.replace(/(\d+(?:\.\d+)?|\([^)]+\))\s+mod\s+(\d+(?:\.\d+)?|\([^)]+\))/gi, `(($1) % ($2))`);
            processed = processed.replace(/PI/g, 'Math.PI');
            processed = processed.replace(/E/g, 'Math.E');

            wrapTrig('sin', false);
            wrapTrig('cos', false);
            wrapTrig('tan', false);
            ['asin', 'acos', 'atan'].forEach(inv => {
                const regexInv = new RegExp(`${inv}\\(([^)]+)\\)`, 'g');
                processed = processed.replace(regexInv, (match, inner) => {
                    if (degMode) return `(Math.${inv}(${inner}) * 180 / Math.PI)`;
                    else return `Math.${inv}(${inner})`;
                });
            });

            processed = processed.replace(/sec\(([^)]+)\)/g, (match, inner) => {
                if (degMode) return `(1 / Math.cos(${inner} * Math.PI/180))`;
                else return `(1 / Math.cos(${inner}))`;
            });
            processed = processed.replace(/csc\(([^)]+)\)/g, (match, inner) => {
                if (degMode) return `(1 / Math.sin(${inner} * Math.PI/180))`;
                else return `(1 / Math.sin(${inner}))`;
            });
            processed = processed.replace(/cot\(([^)]+)\)/g, (match, inner) => {
                if (degMode) return `(1 / Math.tan(${inner} * Math.PI/180))`;
                else return `(1 / Math.tan(${inner}))`;
            });

            processed = processed.replace(/asec\(([^)]+)\)/g, (match, inner) => {
                let radExpr = `Math.acos(1/${inner})`;
                if (degMode) return `(${radExpr} * 180 / Math.PI)`;
                else return radExpr;
            });
            processed = processed.replace(/acsc\(([^)]+)\)/g, (match, inner) => {
                let radExpr = `Math.asin(1/${inner})`;
                if (degMode) return `(${radExpr} * 180 / Math.PI)`;
                else return radExpr;
            });
            processed = processed.replace(/acot\(([^)]+)\)/g, (match, inner) => {
                let radExpr = `Math.atan(1/${inner})`;
                if (degMode) return `(${radExpr} * 180 / Math.PI)`;
                else return radExpr;
            });

            window.factorial_util = (n) => {
                let x = parseFloat(n);
                if (isNaN(x)) return NaN;
                if (Math.abs(x - Math.floor(x)) < 1e-12 && x >= 0) {
                    let intN = Math.floor(x);
                    if (intN === 0 || intN === 1) return 1;
                    let res = 1;
                    for (let i = 2; i <= intN; i++) res *= i;
                    return res;
                } else {
                    return gamma_util(x+1);
                }
            };

            window.gamma_util = (z) => {
                if (z <= 0 && Math.abs(z - Math.floor(z)) < 1e-12) return NaN;
                if (z < 0.5) return Math.PI / (Math.sin(Math.PI * z) * gamma_util(1 - z));
                z = z - 1;
                const p = [0.99999999999980993, 676.5203681218851, -1259.1392167224028,
                            771.32342877765313, -176.61502916214059, 12.507343278686905,
                            -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
                let x = p[0];
                for (let i = 1; i < p.length; i++) x += p[i] / (z + i);
                const t = z + p.length - 1.5;
                return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
            };

            window.comb_util = (n, k) => {
                let nInt = parseInt(n), kInt = parseInt(k);
                if (isNaN(nInt) || isNaN(kInt)) return NaN;
                if (kInt < 0 || kInt > nInt) return 0;
                let res = 1;
                for (let i = 1; i <= kInt; i++) res *= (nInt - kInt + i) / i;
                return Math.round(res);
            };
            window.perm_util = (n, k) => {
                let nInt = parseInt(n), kInt = parseInt(k);
                if (isNaN(nInt) || isNaN(kInt)) return NaN;
                if (kInt < 0 || kInt > nInt) return 0;
                let res = 1;
                for (let i = 0; i < kInt; i++) res *= (nInt - i);
                return res;
            };

            processed = processed.replace(/(\d)([a-zA-Zπℯ(])/g, '$1*$2');
            processed = processed.replace(/([a-zA-Zπℯ])(\d)/g, '$1*$2');

            const evalFunc = new Function('Math', 'factorial_util', 'gamma_util', 'comb_util', 'perm_util', 
                `'use strict'; return (${processed})`);
            let rawResult = evalFunc(Math, window.factorial_util, window.gamma_util, window.comb_util, window.perm_util);
            if (isNaN(rawResult) || !isFinite(rawResult)) throw new Error("Math Error");
            return rawResult;
        } catch (e) {
            console.warn(e);
            return NaN;
        }
    }

    function computeAndDisplay() {
        if (currentExpression === "") {
            lastResult = 0;
            lastAns = 0;
            updateDisplay();
            return;
        }
        let expr = currentExpression;
        let exprWithAns = expr.replace(/ANS/g, `(${lastAns})`);
        let result = evaluateExpression(exprWithAns, degMode);
        if (isNaN(result) || !isFinite(result)) {
            resultDiv.innerText = "ERROR";
            resultDiv.parentElement.classList.add("error-shake");
            setTimeout(() => resultDiv.parentElement.classList.remove("error-shake"), 300);
            lastResult = 0;
            lastAns = 0;
        } else {
            lastResult = result;
            lastAns = result;
            updateDisplay();
        }
        if (!isNaN(result) && isFinite(result)) updateDisplay();
        else resultDiv.innerText = "Undefined";
    }

    function setExpression(newExpr, compute = true) {
        currentExpression = newExpr;
        updateDisplay();
        if (compute) computeAndDisplay();
    }

    function appendToExpression(val) {
        let newExpr = currentExpression + val;
        setExpression(newExpr, true);
    }

    function clearAll() {
        currentExpression = "";
        lastResult = 0;
        setExpression("", true);
    }

    function backspace() {
        let newExpr = currentExpression.slice(0, -1);
        setExpression(newExpr, true);
    }

    function memStore() { memoryValue = lastResult; }
    function memRecall() { appendToExpression(memoryValue.toString()); }
    function memAdd() { memoryValue += lastResult; }
    function memClear() { memoryValue = 0; }

    function toggleAngleMode() {
        degMode = !degMode;
        if (currentExpression !== "") computeAndDisplay();
        else updateDisplay();
        let modeLabel = degMode ? "°" : "rad";
        resultDiv.innerText = resultDiv.innerText + "   [" + modeLabel + "]";
        setTimeout(() => updateDisplay(), 800);
    }

    function insertAns() { appendToExpression("ANS"); }

    const buttonLayout = [
        ["MC", "MR", "M+", "MS", "deg/rad", "AC"],
        ["sin", "cos", "tan", "asin", "acos", "atan"],
        ["sinh", "cosh", "tanh", "ln", "log", "√"],
        ["xʸ", "x²", "x³", "∛", "eˣ", "10ˣ"],
        ["π", "e", "!", "γ", "C(n,k)", "P(n,k)"],
        ["7", "8", "9", "(", ")", "mod"],
        ["4", "5", "6", "*", "/", "rand"],
        ["1", "2", "3", "+", "-", "root"],
        ["0", ".", "ANS", "^", "DEL", "="]
    ];

    function createButtons() {
        const container = document.getElementById("buttonsGrid");
        container.innerHTML = "";
        for (let row of buttonLayout) {
            for (let btnLabel of row) {
                const btn = document.createElement("button");
                btn.innerText = btnLabel;
                if (btnLabel === "=") btn.classList.add("equal-key");
                else if (btnLabel === "AC") btn.classList.add("clear-key");
                else if (btnLabel === "DEL") btn.classList.add("del-key");
                else if (["sin","cos","tan","ln","log","√","xʸ","π","e","!","γ","C(n,k)","P(n,k)","sinh","cosh","tanh","asin","acos","atan","mod","root","rand","eˣ","10ˣ","x²","x³","∛"].includes(btnLabel))
                    btn.classList.add("math-fn");
                else if (["MC","MR","M+","MS","deg/rad","ANS"].includes(btnLabel))
                    btn.classList.add("fn-key");
                
                btn.addEventListener("click", () => { handleButton(btnLabel); });
                container.appendChild(btn);
            }
        }
    }

    function handleButton(cmd) {
        switch(cmd) {
            case "AC": clearAll(); break;
            case "DEL": backspace(); break;
            case "=": computeAndDisplay(); break;
            case "deg/rad": toggleAngleMode(); break;
            case "MC": memClear(); break;
            case "MR": memRecall(); break;
            case "M+": memAdd(); break;
            case "MS": memStore(); break;
            case "ANS": insertAns(); break;
            case "π": appendToExpression("π"); break;
            case "e": appendToExpression("ℯ"); break;
            case "√": appendToExpression("sqrt("); break;
            case "∛": appendToExpression("cbrt("); break;
            case "ln": appendToExpression("ln("); break;
            case "log": appendToExpression("log10("); break;
            case "sin": appendToExpression("sin("); break;
            case "cos": appendToExpression("cos("); break;
            case "tan": appendToExpression("tan("); break;
            case "asin": appendToExpression("asin("); break;
            case "acos": appendToExpression("acos("); break;
            case "atan": appendToExpression("atan("); break;
            case "sinh": appendToExpression("sinh("); break;
            case "cosh": appendToExpression("cosh("); break;
            case "tanh": appendToExpression("tanh("); break;
            case "xʸ": appendToExpression("^"); break;
            case "x²": appendToExpression("^2"); break;
            case "x³": appendToExpression("^3"); break;
            case "eˣ": appendToExpression("exp("); break;
            case "10ˣ": appendToExpression("10^("); break;
            case "!": appendToExpression("!"); break;
            case "γ": appendToExpression("gamma("); break;
            case "C(n,k)": appendToExpression("C("); break;
            case "P(n,k)": appendToExpression("P("); break;
            case "mod": appendToExpression(" mod "); break;
            case "root": appendToExpression("root("); break;
            case "rand": appendToExpression("rand()"); break;
            default: appendToExpression(cmd);
        }
    }

    createButtons();
    clearAll();
</script>
</body>
</html>
